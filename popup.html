<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 12px;
    }

    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #fff; }

    .section { margin-bottom: 12px; }

    label {
      display: block;
      margin-bottom: 4px;
      color: #aaa;
      font-size: 12px;
    }

    .upload-btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: #2d2d2d;
      border: 1px dashed #555;
      border-radius: 6px;
      color: #ccc;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }
    .upload-btn:hover { background: #3a3a3a; }
    #file-input { display: none; }

    #preview {
      display: none;
      width: 100%;
      height: 80px;
      object-fit: contain;
      background: #2d2d2d;
      border-radius: 6px;
      margin-top: 6px;
    }

    .row { display: flex; align-items: center; gap: 6px; }

    input[type=range] { flex: 1; accent-color: #4f8ef7; }

    input[type=number] {
      width: 56px;
      padding: 3px 5px;
      background: #2d2d2d;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
      text-align: right;
    }
    input[type=number]:focus { outline: none; border-color: #4f8ef7; }

    #btn-reset-width {
      flex: none;
      width: 24px;
      height: 24px;
      padding: 0;
      background: #2d2d2d;
      border: 1px solid #444;
      border-radius: 4px;
      color: #aaa;
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
    }
    #btn-reset-width:hover { background: #3a3a3a; color: #fff; }

    .btn-row { display: flex; gap: 8px; margin-top: 4px; }

    button {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.15s;
    }

    #btn-show { background: #4f8ef7; color: #fff; }
    #btn-show:hover { background: #3a7de0; }
    #btn-top { background: #7c4ff7; color: #fff; }
    #btn-top:hover { background: #6a3de0; }
    #btn-hide { background: #3a3a3a; color: #ccc; }
    #btn-hide:hover { background: #444; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .toggle-label { color: #aaa; font-size: 12px; }
    .switch { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-sw {
      position: absolute; inset: 0;
      background: #444; border-radius: 18px;
      cursor: pointer; transition: background 0.2s;
    }
    .slider-sw::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 3px; top: 3px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider-sw { background: #7c4ff7; }
    .switch input:checked + .slider-sw::before { transform: translateX(14px); }

    .hint { margin-top: 10px; font-size: 11px; color: #666; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>Overlay Perfect</h1>

  <div class="section">
    <label>Image</label>
    <label class="upload-btn" for="file-input">📂 Choose PNG / JPG / WebP</label>
    <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp">
    <img id="preview">
  </div>

  <div class="section">
    <label>Opacity — <span id="opacity-val">50</span>%</label>
    <div class="row">
      <input type="range" id="opacity" min="0" max="100" value="50">
    </div>
  </div>

  <div class="section">
    <label>Width (px)</label>
    <div class="row">
      <input type="range" id="width" min="100" max="2560" value="1280">
      <input type="number" id="width-num" min="100" max="2560" value="1280">
      <button id="btn-reset-width" title="Reset to original">↺</button>
    </div>
  </div>

  <div class="toggle-row">
    <label class="switch">
      <input type="checkbox" id="difference">
      <span class="slider-sw"></span>
    </label>
    <span class="toggle-label">Difference mode</span>
  </div>

  <div class="btn-row">
    <button id="btn-show">Show</button>
    <button id="btn-top">↑ To top</button>
    <button id="btn-hide">Hide</button>
  </div>

  <p class="hint">If a site modal covers the overlay — click <b>↑ To top</b></p>

  <script src="popup.js"></script>
</body>
</html>
